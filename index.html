<meta charset="UTF-8">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
body { background: transparent; margin: 0; padding: 0; }
#chat-fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: #2563eb; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: transform 0.2s, background 0.2s; box-shadow: 0 4px 16px rgba(37,99,235,0.35); }
#chat-fab:hover { transform: scale(1.07); background: #3b82f6; }
#chat-fab svg { width: 24px; height: 24px; fill: white; }
#notif-dot { position: absolute; top: -2px; right: -2px; width: 11px; height: 11px; background: #e74c3c; border-radius: 50%; border: 2px solid white; }
#chat-window { position: fixed; bottom: 92px; right: 24px; width: 340px; background: #ffffff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 18px; display: flex; flex-direction: column; overflow: hidden; z-index: 9998; transition: opacity 0.2s, transform 0.2s; transform-origin: bottom right; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
#chat-window.hidden { opacity: 0; pointer-events: none; transform: scale(0.92); }
.chat-header { background: #2563eb; padding: 14px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.avatar-circle { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; color: white; flex-shrink: 0; }
.header-info p { font-size: 14px; font-weight: 500; color: white; line-height: 1.2; }
.header-info span { font-size: 11px; color: rgba(255,255,255,0.7); }
.online-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; display: inline-block; margin-right: 4px; }
#chat-body { padding: 14px; display: flex; flex-direction: column; gap: 8px; height: 340px; overflow-y: auto; scroll-behavior: smooth; }
#chat-body::-webkit-scrollbar { width: 4px; }
#chat-body::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
.msg { max-width: 82%; font-size: 13px; line-height: 1.5; padding: 9px 13px; border-radius: 13px; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.msg.bot { background: #f1f5f9; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 3px; }
.msg.user { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 3px; }
.typing-wrap { align-self: flex-start; background: #f1f5f9; border-radius: 13px; border-bottom-left-radius: 3px; padding: 11px 15px; display: flex; gap: 4px; align-items: center; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #94a3b8; animation: bounce 1s infinite; }
.dot:nth-child(2) { animation-delay: .15s; }
.dot:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
#input-row { padding: 10px 12px; border-top: 0.5px solid rgba(0,0,0,0.08); display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
#txt-in { flex: 1; padding: 9px 14px; border: 0.5px solid #cbd5e1; border-radius: 22px; font-size: 13px; background: #f8fafc; color: #1e293b; outline: none; font-family: inherit; }
#txt-in:focus { border-color: #2563eb; }
#send-btn { width: 34px; height: 34px; border-radius: 50%; background: #2563eb; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
#send-btn:hover { background: #3b82f6; }
#send-btn svg { width: 15px; height: 15px; fill: white; }
.hidden { display: none !important; }
@media (max-width: 480px) { #chat-window { width: calc(100vw - 24px); right: 12px; bottom: 80px; } #chat-fab { bottom: 16px; right: 16px; } }
</style>

<button id="chat-fab" onclick="toggleChat()">

  <svg id="icon-close" class="hidden" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>

</button>

<div id="chat-window" class="hidden">

function extractName(val) {
  let cleaned = val.trim();
  for (var i = 0; i < NAME_PATTERNS.length; i++) {
    const result = cleaned.replace(NAME_PATTERNS[i], '').trim();
    if (result && result !== cleaned) { cleaned = result; break; }
  }
  cleaned = cleaned.replace(/[.!?,;]+$/, '').replace(/\s+(?:hai|h|hoon|hun|hu|hain|hein)$/i, '').trim();
  // Remove common noise/typo words that appear before real names
  cleaned = cleaned.replace(/^(?:js|is|am|are|the|a|an|mr|mrs|ms|dr|sir|ma'am|mam|dear|hi|hello|hey)\s+/i, '').trim();
  if (!cleaned || cleaned.split(/\s+/).length > 4) return val.trim();
  return cleaned.split(/\s+/).map(function(w) {
    return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
  }).join(' ');
}

function isValidEmail(str) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(str.trim()); }

function extractEmail(str) {
  const m = str.match(/[^\s@]+@[^\s@]+\.[^\s@]+/);
  return m ? m[0] : null;
}

function extractPhone(str) {
  const m = str.replace(/[\s\-().+]/g, '').match(/\d{10,13}/);
  return m ? m[0] : null;
}

function matchesAny(lower, list) {
  for (var i = 0; i < list.length; i++) {
    var item = list[i];
    if (item instanceof RegExp) { if (item.test(lower)) return true; }
    else { if (lower.indexOf(item) !== -1) return true; }
  }
  return false;
}

function hasNegation(lower) {
  return /\b(don't|dont|not|avoid|never|no|won\'t|wont|can\'t|cant|refuse|reject|excluded|restriction|restricted|banned|illegal|nahi|nahi karte|mat|band)\b/.test(lower);
}

function submitToBackend(name, email, phone, query) {
  const payload = JSON.stringify({ name: name, email: email, phone: phone, query: query });
  const base = window.CHATBOT_API_BASE || '';
  fetch(base + '/submit-email', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: payload
  }).catch(function() {});
  fetch(base + '/submit-whatsapp', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: payload
  }).catch(function() {});
}

function handleInput() {
  if (busy) return;
  const val = txtIn.value.trim();
  if (!val) return;
  txtIn.value = '';
  const lower = val.toLowerCase();

  if (step === 1) {
    addMsg('user', val);
    const words = lower.replace(/[^a-z0-9\s]/g, '').split(/\s+/);
    const isGreeting = words.some(function(w) { return GREETINGS.indexOf(w) !== -1; }) && words.length <= 3 && lower.indexOf('@') === -1;
    if (isGreeting) {
      busy = true;
      showTyping(function() { addMsg('bot', 'Hello! Could you please share your name so I can assist you better?'); busy = false; });
    } else {
      userName = extractName(val);
      busy = true;
      showTyping(function() {
        addMsg('bot', 'Great to meet you, ' + userName + '! How can I help you today? Feel free to ask me anything — about our pricing, releases, content policy, or anything else.');
        step = 2;
        busy = false;
      });
    }
    return;
  }

  if (awaitingEmail) {
    const skipWords = ['skip','no','nahi','nhi','nope','not now','later','no thanks','abhi nahi','nahi chahiye','dont want','private','privacy','not interested','i am not interested','interested nahi','nahi dena','nhi dena','na','naa','mat maango','mat puchho','rehne do','chhod do','leave it','never mind','nevermind','ignore','pass'];
    const wantsSkip = skipWords.some(function(s) { return lower.indexOf(s) !== -1; });
    if (wantsSkip && !val.includes('@')) {
      awaitingEmail = false;
      addMsg('user', val);
      showTyping(function() {
        addMsg('bot', 'No problem at all! Feel free to reach out anytime. Is there anything else I can help you with?');
        busy = false;
      });
      return;
    }
    const emailFound = extractEmail(val);
    if (emailFound && isValidEmail(emailFound)) {
      emailCollected = emailFound;
      awaitingEmail = false;
      addMsg('user', val);
      busy = true;
      showTyping(function() {
        addMsg('bot', 'Thank you! We have noted your email as ' + emailCollected + '.');
        setTimeout(function() {
          if (!phoneCollected) {
            addMsg('bot', 'Would you also like to share a contact number? This helps our team reach you faster — though it is completely optional.');
            awaitingPhone = true;
          } else {
            addMsg('bot', 'We already have all your details. Our team will reach out to you very soon!');
          }
          busy = false;
        }, 500);
      });
    } else if (val.indexOf('@') !== -1) {
      addMsg('user', val);
      showTyping(function() { addMsg('bot', 'That email doesn\'t seem valid. Please make sure it\'s in the format: name@domain.com'); busy = false; });
    } else {
      addMsg('user', val);
      showTyping(function() { addMsg('bot', 'To proceed, I\'ll need your email address. Please share it in the format: name@domain.com — or type skip if you prefer not to.'); busy = false; });
    }
    return;
  }

  if (awaitingPhone) {
    const digitsOnly = val.replace(/[\s\-().+]/g, '');
    const phoneFound = digitsOnly.match(/^\d{10,12}$/);
    addMsg('user', val);
    busy = true;
    if (!phoneFound) {
      const skipWords = ['skip','no','nahi','nhi','nope','not now','later','no thanks','abhi nahi','nahi chahiye','dont want','don\'t want','privacy','private'];
      const wantsSkip = skipWords.some(function(s) { return lower.indexOf(s) !== -1; });
      if (wantsSkip) {
        awaitingPhone = false;
        submitToBackend(userName, emailCollected, '', chosenTopic);
        showTyping(function() {
          addMsg('bot', 'No problem at all! Your enquiry has been noted and our team will reach out to you at ' + emailCollected + ' at the earliest. Feel free to ask if you have anything else!');
          busy = false;
        });
        return;
      }
      showTyping(function() { addMsg('bot', 'That does not seem like a valid phone number. Please check and try again — or type skip if you would prefer not to share it.'); busy = false; });
      return;
    }
    awaitingPhone = false;
    phoneCollected = phoneFound[0];
    submitToBackend(userName, emailCollected, phoneFound[0], chosenTopic);
    showTyping(function() {
      addMsg('bot', 'Thank you, ' + userName + '! All your details have been received.');
      setTimeout(function() {
        addMsg('bot', 'Our team will reach out to you very soon. We appreciate your time! Is there anything else I can help you with?');
        busy = false;
      }, 500);
    });
    return;
  }

  addMsg('user', val);
  busy = true;
  const intent = detectIntent(lower);
  if (intent === 'who_uses') handleWhoUses();
  else if (intent === 'benefits') handleBenefits();
  else if (intent === 'reach') handleReach();
  else if (intent === 'tracking') handleTracking();
  else if (intent === 'multimedia') handleMultimedia();
  else if (intent === 'distribution') handleDistribution();
  else if (intent === 'testimonial') handleTestimonial();
  else if (intent === 'social') handleSocial();
  else if (intent === 'how_it_works') handleHowItWorks();
  else if (intent === 'processing_time') handleProcessingTime();
  else if (intent === 'writing_service') handleWritingService();
  else if (intent === 'what_publish') handleWhatPublish();
  else if (intent === 'seo') handleSEO();
  else if (intent === 'prepare') handlePrepare();
  else if (intent === 'media_monitoring') handleMediaMonitoring();
  else if (intent === 'contact_email') handleContactEmail();
  else if (intent === 'about') handleAbout();
  else if (intent === 'capabilities') handleCapabilities();
  else if (intent === 'pricing') handlePricing();
  else if (intent === 'releases') handleReleases();
  else if (intent === 'content') handleContent();
  else if (intent === 'contact') handleContact();
  else if (intent === 'media') handleMedia();
  else if (intent === 'thanks') handleThanks();
  else if (intent === 'goodbye') handleGoodbye();
  else handleUnknown();
}
